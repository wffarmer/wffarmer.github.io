<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>warframe.school</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <link rel="icon" href="images/icon.png">
</head>

<body>
    <section class="theme">
        <nav class="topmenu">
            <div class="hamburgermenu" id="hamburger">
                <img src="images/burger.png" id="burgerbars" alt="menu">
            </div>
                <aside class="leftmenu">
                    <h2>
                        LANGUAGE
                    </h2>
                    <select id="togglelang">
                        <option value="english">English</option>
                        <option value="russian">Русский</option>
                    </select>
                    <h3>
                        THEME
                    </h3>
                    <select name="theme" id="toggletheme">
                        <option value="darktheme">Dark</option>
                        <option value="lighttheme">Light</option>
                    </select>
                    <h4>
                        DARK MODE TEXT COLOR
                    </h4>
                    <select name="color" id="togglecolor">
                        <option value="orange" id="orange">Orange</option>
                        <option value="white" id="white">White</option>
                        <option value="red" id="red">Red</option>
                        <option value="blue" id="blue">Blue</option>
                    </select>
                </aside>
            <a id="logo" href="index.html">
                <img src="images/logo.png" alt="warframe.school">
            </a>
            <div class="searchbox">
                <form>
                    <input type="text" placeholder="Search...">
                    <button type="submit">
                        <i class="fa fa-search" aria-hidden="false"> </i>
                    </button>
                </form>
            </div>
        </nav>
        <p class="test">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Fuga ab cumque, pariatur mollitia optio exercitationem omnis hic voluptatem, sit aliquid nobis obcaecati laboriosam nam fugiat, nesciunt perferendis minus. Recusandae, quam.
        </p>
    </section>
    <script src="script.js"></script>
</body>

<footer>

</footer>

</html>
